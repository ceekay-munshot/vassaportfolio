name: Refresh peer data

# Keeps the Positioning screen's data current without manual work. Re-runs both
# public-data ingests and, if anything changed, opens (or updates) a pull request
# with the refreshed JSON — so the data stays fresh but merges stay under review.
#
#   - Ownership + marquee investors -> src/data/peers.json      (Tickertape, Trendlyne)
#   - Mutual-fund holdings          -> src/data/fundHolders.json (AMC monthly disclosures)
#
# Runs on the 15th of each month (after month-end filings are published) and can
# also be triggered by hand from the Actions tab.

on:
  schedule:
    - cron: "0 6 15 * *"   # 06:00 UTC on the 15th
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: refresh-peer-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install parser dependencies
        run: pip install --quiet openpyxl xlrd

      - name: Refresh ownership + marquee investors
        run: python ingest/build_peers.py

      - name: Refresh mutual-fund holdings
        run: python ingest/build_fund_holdings.py

      - name: Open/update PR if data changed
        uses: peter-evans/create-pull-request@v6
        with:
          add-paths: src/data/peers.json,src/data/fundHolders.json
          branch: automation/peer-data-refresh
          delete-branch: true
          commit-message: "Refresh peer data (ownership, investors, fund holdings)"
          title: "Monthly peer data refresh"
          body: |
            Automated refresh of the Positioning screen's public data.

            - `src/data/peers.json` — ownership structure + marquee-investor overlap (Tickertape, Trendlyne)
            - `src/data/fundHolders.json` — mutual funds holding each stock (AMC monthly disclosures)

            Regenerated by `.github/workflows/refresh-peer-data.yml`. Review the diff and merge to publish.
